<!doctype html>
<html lang="en">

<head>
  <!-- Character encoding for proper text rendering -->
  <meta charset="UTF-8" />

  <!-- Favicon displayed in the browser tab -->
  <link rel="icon" type="image/png" href="/fo.png" />

  <!-- Makes the website responsive on different screen sizes -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title of the webpage shown in the browser tab -->
  <title>Hostel Mess Management</title>

  <!-- Basic description of the website for search engines -->
  <meta name="description" content="Hostel Mess Management System" />

  <!-- Author of the website -->
  <meta name="author" content="Prakash Singh" />

  <!-- Open Graph meta tags (used when sharing the site on platforms like Facebook, LinkedIn etc.) -->
  <meta property="og:title" content="Hostel Mess Management" />
  <meta property="og:description" content="Hostel Mess Management System" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/nitkkr.png" />

  <!-- Twitter card settings (used when sharing the link on Twitter/X) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/fo.png" />
</head>

<body>

  <!-- Root element where the React application will be mounted -->
  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
